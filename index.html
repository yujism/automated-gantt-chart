<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gantt Chart Builder</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230b0d14' width='100' height='100' rx='18'/><rect x='15' y='20' width='28' height='6' rx='2' fill='%23c4b5fd'/><rect x='15' y='32' width='45' height='6' rx='2' fill='%2367e8f9'/><rect x='15' y='44' width='38' height='6' rx='2' fill='%23fca5a5'/><rect x='15' y='56' width='52' height='6' rx='2' fill='%23f9a8d4'/><rect x='15' y='68' width='35' height='6' rx='2' fill='%2394a3b8'/><rect x='15' y='80' width='42' height='6' rx='2' fill='%2386efac'/><circle cx='72' cy='23' r='2.5' fill='%23c4b5fd' opacity='0.4'/><circle cx='78' cy='23' r='2.5' fill='%23c4b5fd' opacity='0.4'/><circle cx='84' cy='23' r='2.5' fill='%23c4b5fd' opacity='0.4'/><circle cx='72' cy='35' r='2.5' fill='%2367e8f9' opacity='0.4'/><circle cx='78' cy='35' r='2.5' fill='%2367e8f9' opacity='0.4'/><circle cx='84' cy='35' r='2.5' fill='%2367e8f9' opacity='0.4'/></svg>">
</head>
<body>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg0:#0b0d14;--bg1:#10131e;--bg2:#161b2e;--bg3:#1c2238;--bd:#1e2438;--t1:#dde4f0;--t2:#8090b0;--t3:#424b6a;--acc:#c4b5fd}
html,body{height:100%;margin:0;padding:0;overflow:hidden}
body{background:var(--bg0);color:var(--t1);font-family:system-ui,sans-serif;font-size:13px}
.wrap{display:flex;height:100vh;overflow:hidden;background:var(--bg0)}
.sidebar{width:305px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-body{flex:1;overflow-y:auto;padding:10px 12px}
.sb-body::-webkit-scrollbar{width:4px}.sb-body::-webkit-scrollbar-track{background:transparent}.sb-body::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
.label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:4px}
input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:6px 9px;color:var(--t1);font-size:12px;outline:none}
input[type=text]:focus{border-color:#4a5090}
input[type=date]{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:5px 8px;color:var(--t1);font-size:11px;outline:none;width:100%}
input[type=date]:focus{border-color:#4a5090}
input[type=number]{width:44px;background:var(--bg0);border:1px solid var(--bd);border-radius:5px;padding:4px 5px;color:var(--t1);font-size:11px;text-align:center;outline:none}
input[type=number]:focus{border-color:#4a5090}
input[type=checkbox]{accent-color:var(--acc)}
.prod-card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px}
.prod-name-inp{background:transparent;border:none;border-bottom:1px solid var(--bd);color:var(--acc);font-size:13px;font-weight:600;outline:none;width:100%;padding-bottom:2px}
.prod-name-inp:focus{border-bottom-color:#7060cc}
.btn-add{background:var(--bg2);color:#7eb3ff;border:1px dashed var(--bd);border-radius:7px;padding:7px;cursor:pointer;font-size:12px;width:100%}
.btn-add:hover{background:var(--bg3)}
.btn-sm{background:var(--bg3);color:var(--t2);border:1px solid var(--bd);border-radius:5px;padding:3px 9px;cursor:pointer;font-size:11px}
.btn-sm:hover{background:#252a40}
.btn-export{background:#0d2418;color:#7ddc9f;border:1px solid #1e4a30;border-radius:7px;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;width:100%;margin-top:10px;letter-spacing:.03em;position:relative}
.btn-export:hover{background:#102d1e}
.btn-export:active{opacity:.8}
.btn-export:disabled{opacity:.4;cursor:not-allowed}
.stage-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.gantt-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.gantt-header{padding:10px 14px;background:var(--bg1);border-bottom:1px solid var(--bd);flex-shrink:0}
.gantt-scroll{flex:1;overflow:auto}
.gantt-scroll::-webkit-scrollbar{width:6px;height:6px}.gantt-scroll::-webkit-scrollbar-track{background:var(--bg0)}.gantt-scroll::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
table{border-collapse:collapse;table-layout:fixed}
th,td{border:1px solid #12151f;padding:0}
.th-task{background:var(--bg1);color:var(--t3);font-size:10px;font-weight:600;padding:6px 10px;text-align:left;position:sticky;top:0;left:0;z-index:30;width:155px;min-width:155px}
.th-month{background:var(--bg1);color:var(--t2);font-size:9px;font-weight:600;text-align:center;padding:5px 0;position:sticky;top:0;z-index:20;text-transform:uppercase;letter-spacing:.06em}
.th-day{font-size:8px;font-weight:600;text-align:center;padding:2px 0;position:sticky;top:26px;z-index:20;width:24px;min-width:24px;line-height:1.3}
.td-task{background:var(--bg1);position:sticky;left:0;z-index:10;white-space:nowrap}
.td-prod{font-size:11px;font-weight:700;padding:5px 10px;color:var(--acc)}
.td-stage{font-size:10px;padding:3px 10px 3px 18px;color:var(--t2)}
.legend-box{background:var(--bg0);border:1px solid var(--bd);border-radius:7px;padding:10px;margin-top:10px}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);flex-direction:column;gap:8px;font-size:12px}
</style>

<div class="wrap" id="app">
  <div class="sidebar">
    <div class="sb-head">
      <div style="font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px">Production Planner</div>
      <div style="font-size:17px;font-weight:700;color:var(--acc);margin-bottom:12px">Gantt Chart Builder</div>
      <div class="label">Project Name</div>
      <input type="text" id="proj-name" value="Production Planning">
    </div>
    <div class="sb-body">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.08em">Products</span>
        <button class="btn-sm" onclick="addProduct()">+ Add</button>
      </div>
      <div id="products-list"></div>
      <button class="btn-add" onclick="addProduct()">+ Tambah Product</button>
      <div class="legend-box">
        <div class="label" style="margin-bottom:7px">Legend</div>
        <div id="legend-stages"></div>
        <div style="border-top:1px solid var(--bd);margin-top:7px;padding-top:7px">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
            <div style="width:11px;height:11px;border-radius:2px;background:rgba(200,80,80,0.35)"></div>
            <span style="font-size:11px;color:var(--t3)">Tanggal merah (OFF)</span>
          </div>
          <div style="display:flex;align-items:center;gap:7px">
            <div style="width:11px;height:11px;border-radius:2px;background:rgba(100,120,200,0.2)"></div>
            <span style="font-size:11px;color:var(--t3)">Weekend (1 shift)</span>
          </div>
        </div>
      </div>
      <button class="btn-export" id="btn-export" onclick="exportExcel()">⬇ Export to Excel</button>
    </div>
  </div>

  <div class="gantt-wrap">
    <div class="gantt-header">
      <div id="gantt-title" style="font-size:14px;font-weight:600;color:var(--t1)">Production Planning</div>
      <div id="gantt-sub" style="font-size:11px;color:var(--t3);margin-top:1px"></div>
    </div>
    <div class="gantt-scroll" id="gantt-scroll"><div id="gantt-content">
      <div class="empty"><div style="font-size:28px">📅</div><div>Tambah product dan isi stage durations</div></div>
    </div></div>
  </div>
</div>
<div id="drag-tip" style="position:fixed;background:#1c2238;color:#dde4f0;font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid #2a3050;pointer-events:none;display:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.6)"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script>
const HOLIDAYS=new Set(["2025-01-01","2025-01-27","2025-01-28","2025-03-29","2025-03-30","2025-03-31","2025-04-01","2025-04-18","2025-05-01","2025-05-12","2025-05-13","2025-05-29","2025-06-01","2025-06-06","2025-06-07","2025-07-27","2025-08-17","2025-09-05","2025-12-25","2025-12-26","2026-01-01","2026-01-26","2026-01-27","2026-01-28","2026-03-20","2026-03-21","2026-04-02","2026-04-03","2026-04-06","2026-04-07","2026-04-17","2026-05-01","2026-05-14","2026-05-21","2026-05-22","2026-06-01","2026-06-19","2026-06-20","2026-07-10","2026-08-17","2026-09-18","2026-12-25","2026-12-26"]);
const STAGES=[
  {key:"MouldMaking",label:"Mould Making",color:"#fde68a",argb:"FFFDE68A",defaultOn:true},
  {key:"OtorisasiBOM",label:"Otorisasi & BOM",color:"#fdba74",argb:"FFFDBA74",defaultOn:true},
  {key:"SM",label:"SM",color:"#c4b5fd",argb:"FFC4B5FD",defaultOn:true},
  {key:"Production",label:"Production",color:"#67e8f9",argb:"FF67E8F9",defaultOn:true},
  {key:"ReworkSM",label:"Rework SM",color:"#f9a8d4",argb:"FFF9A8D4",defaultOn:false},
  {key:"Packing",label:"Packing",color:"#fca5a5",argb:"FFFCA5A5",defaultOn:true},
  {key:"PlantToDepo",label:"Plant to Depo",color:"#94a3b8",argb:"FF94A3B8",defaultOn:true},
  {key:"Stuffing",label:"Stuffing",color:"#86efac",argb:"FF86EFAC",defaultOn:true},
];
const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DL=["S","M","T","W","T","F","S"];
let products=[],_id=1,currentDr=[],drag=null;

const toStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const isHol=d=>HOLIDAYS.has(toStr(d));
const isWE=d=>d.getDay()===0||d.getDay()===6;
const skipHol=d=>{let r=new Date(d);while(isHol(r))r=addD(r,1);return r;};
const h2r=(h,a)=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;};
const addWorkDays=(start,n)=>{let d=new Date(start),c=0;while(c<n){if(!isHol(d))c++;if(c<n)d=addD(d,1);}return d;};
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");

function blendHex(hexFg,a,hexBg){
  const pr=s=>parseInt(s,16);
  const fr=pr(hexFg.slice(0,2)),fg=pr(hexFg.slice(2,4)),fb=pr(hexFg.slice(4,6));
  const br=pr(hexBg.slice(0,2)),bg=pr(hexBg.slice(2,4)),bb=pr(hexBg.slice(4,6));
  const r=Math.round(fr*a+br*(1-a));
  const g=Math.round(fg*a+bg*(1-a));
  const b=Math.round(fb*a+bb*(1-a));
  return`FF${r.toString(16).padStart(2,"0").toUpperCase()}${g.toString(16).padStart(2,"0").toUpperCase()}${b.toString(16).padStart(2,"0").toUpperCase()}`;
}

const C={
  bg0:"FF0B0D14",bg1:"FF10131E",bg2:"FF161B2E",acc:"FFC4B5FD",
  t1:"FFDDE4F0",t2:"FF8090B0",t3:"FF424B6A",
  weekend:blendHex("6478C8",0.13,"0B0D14"),
  holiday:blendHex("C85050",0.22,"0B0D14"),
  bd:"FF1E2438"
};

function computeSchedule(product){
  if(!product.startDate)return[];
  const result=[];
  let cursor=skipHol(new Date(product.startDate+"T00:00:00"));
  for(const stg of STAGES){
    const sd=product.stages[stg.key];
    if(!sd||!sd.enabled||!sd.days||parseInt(sd.days)<=0)continue;
    const n=parseInt(sd.days);
    // manualStart = user-pinned date; otherwise follow sequential cursor
    const start=sd.manualStart?skipHol(new Date(sd.manualStart+"T00:00:00")):new Date(cursor);
    const end=addWorkDays(start,n);
    result.push({...stg,start,end,manual:!!sd.manualStart});
    // cursor = max end seen — sequential stages wait for ALL previous to finish
    const next=skipHol(addD(end,1));
    if(next>cursor)cursor=next;
  }
  return result;
}

function mkProduct(name=""){
  const stages={};
  STAGES.forEach(({key,defaultOn})=>stages[key]={days:"",enabled:defaultOn,manualStart:null});
  return{id:_id++,name,startDate:new Date().toISOString().split("T")[0],stages};
}
function addProduct(){const p=mkProduct(`Product ${products.length+1}`);products.push(p);renderSidebar();renderGantt();}
function removeProduct(id){products=products.filter(p=>p.id!==id);renderSidebar();renderGantt();}
function updateProdName(id,v){const p=products.find(x=>x.id===id);if(p)p.name=v;renderGantt();}
function updateStartDate(id,v){const p=products.find(x=>x.id===id);if(p)p.startDate=v;renderGantt();}
function updateStage(id,key,field,val){const p=products.find(x=>x.id===id);if(p)p.stages[key][field]=val;if(field==="enabled")renderSidebar();renderGantt();}
function resetManualStart(id,key){const p=products.find(x=>x.id===id);if(p){p.stages[key].manualStart=null;renderSidebar();renderGantt();}}

function renderSidebar(){
  document.getElementById("products-list").innerHTML=products.map(prod=>`
    <div class="prod-card">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <input class="prod-name-inp" value="${esc(prod.name)}" placeholder="Product name" oninput="updateProdName(${prod.id},this.value)">
        <button onclick="removeProduct(${prod.id})" style="background:transparent;border:none;color:#5a3a3a;cursor:pointer;font-size:18px;line-height:1;flex-shrink:0">×</button>
      </div>
      <div style="margin-bottom:8px">
        <div class="label" style="margin-bottom:3px">Start Date</div>
        <input type="date" value="${prod.startDate}" onchange="updateStartDate(${prod.id},this.value)">
      </div>
      ${STAGES.map(stg=>{const sd=prod.stages[stg.key];return`
        <div class="stage-row" style="opacity:${sd.enabled?1:0.4};transition:opacity .15s">
          <input type="checkbox" ${sd.enabled?"checked":""}
            onchange="updateStage(${prod.id},'${stg.key}','enabled',this.checked)">
          <div class="dot" style="background:${stg.color};opacity:${sd.enabled?1:0.5}"></div>
          <span style="flex:1;font-size:11px;color:${sd.enabled?"var(--t2)":"var(--t3)"};text-decoration:${sd.enabled?"none":"line-through"}">${stg.label}${sd.manualStart&&sd.enabled?`<span style="color:#9070d8;font-size:9px;margin-left:3px" title="${sd.manualStart}">⚲</span>`:""}</span>
          ${sd.enabled
            ?`<input type="number" min="0" value="${sd.days||""}" placeholder="0"
                oninput="updateStage(${prod.id},'${stg.key}','days',this.value)"><span style="font-size:10px;color:var(--t3)">d</span>${sd.manualStart?`<button onclick="resetManualStart(${prod.id},'${stg.key}')" title="Reset ke sekuensial\n${sd.manualStart}" style="background:#1a0f2e;color:#c4b5fd;border:1px solid #4a3080;border-radius:4px;padding:0 5px;cursor:pointer;font-size:10px;line-height:1.6;flex-shrink:0">↺</button>`:"<span style='width:18px'></span>"}`
            :`<span style="font-size:10px;color:var(--t3);font-style:italic">skip</span>`}
        </div>`}).join("")}
    </div>`).join("");

  document.getElementById("legend-stages").innerHTML=STAGES.map(stg=>`
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
      <div style="width:11px;height:11px;border-radius:2px;background:${stg.color}"></div>
      <span style="font-size:11px;color:var(--t3)">${stg.label}</span>
    </div>`).join("");
}

function renderGantt(){
  const projName=document.getElementById("proj-name").value;
  document.getElementById("gantt-title").textContent=projName||"Untitled";
  const schedules=products.map(p=>({p,tl:computeSchedule(p)}));
  let minD=null,maxD=null;
  schedules.forEach(({p,tl})=>{
    if(p.startDate){const sd=new Date(p.startDate+"T00:00:00");if(!minD||sd<minD)minD=sd;}
    tl.forEach(s=>{if(!maxD||s.end>maxD)maxD=s.end;});
  });
  document.getElementById("gantt-sub").textContent=`${products.length} product(s)`;
  if(!minD){document.getElementById("gantt-content").innerHTML=`<div class="empty"><div style="font-size:28px">📅</div><div>Set start date pada setiap product</div></div>`;return;}
  if(!maxD)maxD=addD(minD,14);
  maxD=addD(maxD,3);
  const dr=[];for(let d=new Date(minD);d<=maxD;d=addD(d,1))dr.push(new Date(d));
  currentDr=dr;

  const monthGroups=[];let cm=null,cy=null,cs=0;
  dr.forEach((d,i)=>{const m=d.getMonth(),y=d.getFullYear();
    if(m!==cm||y!==cy){if(cm!==null)monthGroups.push({label:`${MN[cm]} ${cy}`,count:i-cs});cm=m;cy=y;cs=i;}
    if(i===dr.length-1)monthGroups.push({label:`${MN[m]} ${y}`,count:dr.length-cs});
  });

  let html=`<table><thead><tr>
    <th class="th-task" style="top:0">TASKS</th>
    ${monthGroups.map(g=>`<th class="th-month" colspan="${g.count}">${g.label}</th>`).join("")}
  </tr><tr>
    <th class="th-task" style="top:26px;border-top:none"></th>
    ${dr.map(d=>{const off=isHol(d),we=isWE(d);
      const bg=off?"rgba(200,80,80,0.22)":we?"rgba(100,120,200,0.13)":"var(--bg1)";
      const col=off?"#c06070":we?"#3a4468":"var(--t3)";
      return`<th class="th-day" style="background:${bg};color:${col}"><div>${d.getDate()}</div><div style="opacity:.65">${DL[d.getDay()]}</div></th>`;
    }).join("")}
  </tr></thead><tbody>`;

  schedules.forEach(({p,tl})=>{
    html+=`<tr><td class="td-task td-prod">${esc(p.name||"Unnamed")} <span style="font-size:9px;color:var(--t3);font-weight:400">${p.startDate||""}</span></td>
    ${dr.map(d=>{const off=isHol(d),we=isWE(d);return`<td style="background:${off?"rgba(200,80,80,0.07)":we?"rgba(100,120,200,0.05)":"var(--bg0)"};height:6px"></td>`;}).join("")}</tr>`;
    STAGES.forEach(stg=>{
      const sd=p.stages[stg.key];
      if(!sd||!sd.enabled||!sd.days||parseInt(sd.days)<=0)return;
      const sched=tl.find(t=>t.key===stg.key);if(!sched)return;
      const isManual=!!sd.manualStart;
      const pinMark=isManual?`<span style="color:#9070d8;font-size:8px;margin-left:2px" title="Posisi manual — double-click untuk reset">⚲</span>`:"";
      html+=`<tr id="srow-${p.id}-${stg.key}" data-prod="${p.id}" data-stage="${stg.key}" data-start="${toStr(sched.start)}" data-days="${parseInt(sd.days)}">
        <td class="td-task td-stage" style="cursor:default" title="${isManual?"Double-click untuk reset ke auto":"Drag bar untuk geser · double-click untuk pin"}">
          <div style="display:flex;align-items:center;gap:7px">
            <div class="dot" style="background:${stg.color};width:6px;height:6px"></div>
            ${stg.label}${pinMark}
          </div>
        </td>
        ${dr.map(d=>{const inR=d>=sched.start&&d<=sched.end;const off=isHol(d),we=isWE(d);
          let bg=inR?(off?h2r(stg.color,.15):we?h2r(stg.color,.55):stg.color):(off?"rgba(200,80,80,0.07)":we?"rgba(100,120,200,0.05)":"transparent");
          return`<td style="background:${bg};height:26px;cursor:ew-resize"></td>`;}).join("")}
      </tr>`;
    });
  });
  html+=`</tbody></table>`;
  document.getElementById("gantt-content").innerHTML=html;
}

async function exportExcel(){
  if(typeof ExcelJS==="undefined"){alert("ExcelJS not loaded yet.");return;}
  const btn=document.getElementById("btn-export");
  btn.disabled=true;btn.textContent="Generating...";
  try{
    const schedules=products.map(p=>({p,tl:computeSchedule(p)}));
    let minD=null,maxD=null;
    schedules.forEach(({p,tl})=>{
      if(p.startDate){const sd=new Date(p.startDate+"T00:00:00");if(!minD||sd<minD)minD=sd;}
      tl.forEach(s=>{if(!maxD||s.end>maxD)maxD=s.end;});
    });
    if(!minD){alert("Tidak ada product dengan start date.");btn.disabled=false;btn.textContent="⬇ Export to Excel";return;}
    if(!maxD)maxD=addD(minD,14);
    maxD=addD(maxD,3);
    const dr=[];for(let d=new Date(minD);d<=maxD;d=addD(d,1))dr.push(new Date(d));

    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet("Gantt Chart",{views:[{state:"frozen",xSplit:1,ySplit:3}]});

    const TASK_W=28,DAY_W=3.2;
    ws.getColumn(1).width=TASK_W;
    dr.forEach((_,i)=>ws.getColumn(i+2).width=DAY_W);

    const mkFill=argb=>({type:"pattern",pattern:"solid",fgColor:{argb}});
    const mkFont=(argb,bold=false,sz=10)=>({color:{argb},bold,size:sz,name:"Calibri"});
    const mkBorder=()=>({top:{style:"thin",color:{argb:"FF1A1E30"}},bottom:{style:"thin",color:{argb:"FF1A1E30"}},left:{style:"thin",color:{argb:"FF1A1E30"}},right:{style:"thin",color:{argb:"FF1A1E30"}}});
    const mkAlign=(h="left",v="middle")=>({horizontal:h,vertical:v});

    const applyCell=(cell,val,fillArgb,fontArgb,bold=false,sz=10,align="left")=>{
      cell.value=val;
      cell.fill=mkFill(fillArgb);
      cell.font=mkFont(fontArgb,bold,sz);
      cell.border=mkBorder();
      cell.alignment=mkAlign(align);
    };

    const monthGroups=[];let cm=null,cy=null,cs=0;
    dr.forEach((d,i)=>{const m=d.getMonth(),y=d.getFullYear();
      if(m!==cm||y!==cy){if(cm!==null)monthGroups.push({label:`${MN[cm]} ${cy}`,start:cs,count:i-cs});cm=m;cy=y;cs=i;}
      if(i===dr.length-1)monthGroups.push({label:`${MN[m]} ${y}`,start:cs,count:dr.length-cs});
    });

    ws.getRow(1).height=22;
    ws.getRow(2).height=18;
    ws.getRow(3).height=18;

    const r1=ws.getRow(1);
    applyCell(r1.getCell(1),document.getElementById("proj-name").value||"Production Planning",C.bg1,C.acc,true,13);
    monthGroups.forEach(g=>{
      const ci=g.start+2;
      const cell=r1.getCell(ci);
      applyCell(cell,g.label,C.bg1,C.t2,true,9,"center");
      if(g.count>1)ws.mergeCells(1,ci,1,ci+g.count-1);
    });
    dr.forEach((_,i)=>{const c=r1.getCell(i+2);c.fill=mkFill(C.bg1);c.border=mkBorder();});

    const r2=ws.getRow(2);
    applyCell(r2.getCell(1),"TASKS",C.bg1,C.t3,true,9);
    dr.forEach((d,i)=>{
      const off=isHol(d),we=isWE(d);
      const bg=off?C.holiday:we?C.weekend:C.bg1;
      const fc=off?"FFC06070":we?"FF3A4468":C.t3;
      applyCell(r2.getCell(i+2),d.getDate(),bg,fc,true,8,"center");
    });

    const r3=ws.getRow(3);
    applyCell(r3.getCell(1),"",C.bg1,C.t3);
    dr.forEach((d,i)=>{
      const off=isHol(d),we=isWE(d);
      const bg=off?C.holiday:we?C.weekend:C.bg1;
      const fc=off?"FFC06070":we?"FF3A4468":C.t3;
      applyCell(r3.getCell(i+2),DL[d.getDay()],bg,fc,false,8,"center");
    });

    let rowIdx=4;
    schedules.forEach(({p,tl})=>{
      const prodRow=ws.getRow(rowIdx++);
      prodRow.height=18;
      applyCell(prodRow.getCell(1),`${p.name||"Unnamed"}  ${p.startDate||""}`,C.bg2,C.acc,true,10);
      dr.forEach((d,i)=>{
        const off=isHol(d),we=isWE(d);
        const bg=off?C.holiday:we?C.weekend:C.bg0;
        prodRow.getCell(i+2).fill=mkFill(bg);
        prodRow.getCell(i+2).border=mkBorder();
      });

      STAGES.forEach(stg=>{
        const sd=p.stages[stg.key];
        if(!sd||!sd.enabled||!sd.days||parseInt(sd.days)<=0)return;
        const sched=tl.find(t=>t.key===stg.key);if(!sched)return;
        const stgRow=ws.getRow(rowIdx++);
        stgRow.height=22;
        applyCell(stgRow.getCell(1),`   ${stg.label}`,C.bg1,C.t2,false,10);
        dr.forEach((d,i)=>{
          const inR=d>=sched.start&&d<=sched.end;
          const off=isHol(d),we=isWE(d);
          let bg;
          if(inR){
            if(off)bg=blendHex(stg.argb.slice(2),0.15,"0B0D14");
            else if(we)bg=blendHex(stg.argb.slice(2),0.6,"0B0D14");
            else bg=stg.argb;
          } else {
            bg=off?C.holiday:we?C.weekend:C.bg0;
          }
          const cell=stgRow.getCell(i+2);
          cell.fill=mkFill(bg);
          cell.border=mkBorder();
        });
      });
    });

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    const fname=`${(document.getElementById("proj-name").value||"gantt").replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.xlsx`;
    a.download=fname;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e){console.error(e);alert("Export error: "+e.message);}
  btn.disabled=false;btn.textContent="⬇ Export to Excel";
}

// ── DRAG SYSTEM ─────────────────────────────────────────────────────────────
function handleGanttMouseDown(e){
  const tr=e.target.closest('tr[data-stage]');if(!tr)return;
  const td=e.target.closest('td');if(!td||td.classList.contains('td-task'))return;
  drag={
    prodId:parseInt(tr.dataset.prod),
    stageKey:tr.dataset.stage,
    origStart:new Date(tr.dataset.start+"T00:00:00"),
    days:parseInt(tr.dataset.days),
    startX:e.clientX,deltaD:0
  };
  e.preventDefault();
  document.body.style.cursor='ew-resize';
  document.body.style.userSelect='none';
}

function handleGanttMouseMove(e){
  if(!drag)return;
  const delta=Math.round((e.clientX-drag.startX)/24);
  if(delta===drag.deltaD)return;
  drag.deltaD=delta;
  updateDragVisual();
  updateDragTip(e);
}

function handleGanttMouseUp(){
  if(!drag)return;
  if(drag.deltaD!==0){
    const p=products.find(x=>x.id===drag.prodId);
    if(p)p.stages[drag.stageKey].manualStart=toStr(skipHol(addD(drag.origStart,drag.deltaD)));
    renderSidebar();renderGantt();
  }
  drag=null;
  document.body.style.cursor='';
  document.body.style.userSelect='';
  hideDragTip();
}

function updateDragVisual(){
  if(!drag)return;
  const stg=STAGES.find(s=>s.key===drag.stageKey);if(!stg)return;
  const newStart=skipHol(addD(drag.origStart,drag.deltaD));
  const newEnd=addWorkDays(newStart,drag.days);
  const row=document.getElementById(`srow-${drag.prodId}-${drag.stageKey}`);if(!row)return;
  row.querySelectorAll('td:not(:first-child)').forEach((td,i)=>{
    const d=currentDr[i];if(!d)return;
    const inR=d>=newStart&&d<=newEnd,off=isHol(d),we=isWE(d);
    td.style.background=inR?(off?h2r(stg.color,.15):we?h2r(stg.color,.55):stg.color):(off?"rgba(200,80,80,0.07)":we?"rgba(100,120,200,0.05)":"transparent");
  });
}

function updateDragTip(e){
  if(!drag)return;
  const tip=document.getElementById('drag-tip');if(!tip)return;
  const stg=STAGES.find(s=>s.key===drag.stageKey);
  const newStart=skipHol(addD(drag.origStart,drag.deltaD));
  const sign=drag.deltaD>=0?'+':'';
  tip.innerHTML=`<span style="color:${stg?stg.color:'#fff'};font-weight:600">${drag.stageKey}</span> → <span style="color:#dde4f0">${toStr(newStart)}</span> <span style="color:var(--t3);font-size:10px">(${sign}${drag.deltaD}d)</span>`;
  tip.style.display='block';
  tip.style.left=(e.clientX+14)+'px';
  tip.style.top=(e.clientY-42)+'px';
}

function hideDragTip(){const tip=document.getElementById('drag-tip');if(tip)tip.style.display='none';}

function handleGanttDblClick(e){
  const tr=e.target.closest('tr[data-stage]');if(!tr)return;
  resetManualStart(parseInt(tr.dataset.prod),tr.dataset.stage);
}

// ── INIT ────────────────────────────────────────────────────────────────────
document.getElementById("proj-name").addEventListener("input",renderGantt);
document.getElementById("gantt-scroll").addEventListener("mousedown",handleGanttMouseDown);
document.getElementById("gantt-scroll").addEventListener("dblclick",handleGanttDblClick);
document.addEventListener("mousemove",handleGanttMouseMove);
document.addEventListener("mouseup",handleGanttMouseUp);
products=[mkProduct("Product 1"),mkProduct("Product 2")];
renderSidebar();renderGantt();
</script>
